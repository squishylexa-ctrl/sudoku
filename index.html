<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neo Sudoku</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; }
  body.neon-theme { font-family: 'Orbitron', sans-serif; }
  #app { position: fixed; top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column; align-items:center; justify-content:center; overflow-y:auto; }
  button { font-family: inherit; cursor: pointer; border: none; outline: none; }
  button:active { opacity: 0.75; }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-5px)}
    40%{transform:translateX(5px)}
    60%{transform:translateX(-3px)}
    80%{transform:translateX(3px)}
  }
  .shake { animation: shake 0.4s ease; }

  @keyframes cagePop {
    0%{transform:scale(1)} 40%{transform:scale(1.08)} 100%{transform:scale(1)}
  }
  .cage-pop { animation: cagePop 0.35s ease; }

  .card {
    border-radius: 20px;
    padding: 28px 32px;
    width: 88%;
    max-width: 360px;
    max-height: 90vh;
    overflow-y: auto;
    margin: auto;
  }

  #particle-canvas {
    position: fixed; top:0; left:0;
    pointer-events: none; z-index: 9999;
    width: 100vw; height: 100vh;
  }

  @keyframes xpFloat {
    0%   { opacity:1; transform: translateY(0) scale(1); }
    60%  { opacity:1; transform: translateY(-28px) scale(1.1); }
    100% { opacity:0; transform: translateY(-50px) scale(0.9); }
  }
  .xp-float { animation: xpFloat 1.4s ease forwards; pointer-events:none; }

  @keyframes barFill {
    from { width: var(--from); }
    to   { width: var(--to); }
  }
  .bar-fill { animation: barFill 0.8s cubic-bezier(.4,0,.2,1) forwards; }

  @keyframes levelUp {
    0%  { opacity:0; transform:scale(0.6) translateY(20px); }
    50% { opacity:1; transform:scale(1.08) translateY(-4px); }
    100%{ opacity:1; transform:scale(1) translateY(0); }
  }
  .level-up-anim { animation: levelUp 0.6s cubic-bezier(.4,0,.2,1) forwards; }

  @keyframes pulse {
    0%,100%{ box-shadow: 0 0 0 0 rgba(255,215,0,0.5); }
    50%    { box-shadow: 0 0 0 8px rgba(255,215,0,0); }
  }
  .pulse { animation: pulse 1s ease 3; }
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div id="app"></div>

<script src="sudoku-engine.js"></script>
<script>
// ── KONSTANTEN & ENGINE ────────────────────────────────────────────
// (ausgelagert in sudoku-engine.js)

const DIFF_LABELS = { easy:"Einfach", mittel:"Mittel", schwer:"Schwer", boshaft:"Boshaft 😈" };
const DIFFICULTIES = ["easy","mittel","schwer","boshaft"];

// ── LEVEL & XP SYSTEM ─────────────────────────────────────────────
const LEVEL_TITLES = [
  "Neuling 🌱","Lehrling 📖","Rätsler 🔍","Denker 🤔","Kenner 🧩",
  "Experte 🧠","Stratege ♟️","Virtuose 🎯","Meister 🏆","Großmeister ⚡",
  "Champion 🥇","Elite 💎","Legende 👑","Mythisch 🌟","Sudoku-Gott 😈",
];
function getLevelTitle(l){ return LEVEL_TITLES[Math.min(l-1,LEVEL_TITLES.length-1)]; }
function xpForLevel(l){ return Math.round(500*Math.pow(1.6,l)); }
function calcLevel(totalXp){
  let level=1, xp=totalXp, needed=xpForLevel(1);
  while(xp>=needed){xp-=needed;level++;needed=xpForLevel(level);}
  return {level,currentXp:xp,neededXp:needed};
}
function calcXpGain(diff,seconds,usedHints,hadErrors){
  const base={easy:100,mittel:250,schwer:400,boshaft:600}[diff];
  let bonus=0;
  const target={easy:300,mittel:600,schwer:1200,boshaft:2400}[diff];
  if(seconds<target) bonus+=Math.round(base*0.5*(1-seconds/target));
  if(!usedHints) bonus+=100;
  if(!hadErrors) bonus+=75;
  return {base,bonus,total:base+bonus};
}
function loadXP(){ try{const s=localStorage.getItem("ks_xp");return s?JSON.parse(s):{totalXp:0};}catch{return{totalXp:0};} }
function saveXP(d){ try{localStorage.setItem("ks_xp",JSON.stringify(d));}catch{} }
function addXP(amount){
  const data=loadXP();
  const before=calcLevel(data.totalXp);
  data.totalXp+=amount;
  const after=calcLevel(data.totalXp);
  saveXP(data);
  return {before,after,levelUp:after.level>before.level,newLevel:after.level};
}

// ── PARTIKEL ───────────────────────────────────────────────────────
const canvas = document.getElementById("particle-canvas");
const ctx = canvas.getContext("2d");
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += p.gravity || 0.15;
    p.vx *= 0.98;
    p.life -= p.decay || 0.022;
    p.rotation = (p.rotation || 0) + (p.rotSpeed || 0.1);
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    ctx.fillStyle = p.color;
    if (p.type === "circle") {
      ctx.beginPath(); ctx.arc(0, 0, p.size/2, 0, Math.PI*2); ctx.fill();
    } else if (p.type === "star") {
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i*4*Math.PI)/5 - Math.PI/2;
        ctx.lineTo(Math.cos(a)*p.size, Math.sin(a)*p.size);
        const a2 = a + Math.PI/5;
        ctx.lineTo(Math.cos(a2)*p.size*0.4, Math.sin(a2)*p.size*0.4);
      }
      ctx.closePath(); ctx.fill();
    } else {
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
    }
    ctx.restore();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

function spawnCageParticles(x, y, w, h, color) {
  for (let i = 0; i < 20; i++) particles.push({
    x: x + Math.random()*w, y: y + Math.random()*h,
    vx: (Math.random()-0.5)*7, vy: (Math.random()-1.8)*6,
    size: 3+Math.random()*5, color,
    type: Math.random()>0.5?"circle":"star",
    decay: 0.022+Math.random()*0.02, gravity: 0.13,
    life: 1, rotation: 0, rotSpeed: (Math.random()-0.5)*0.4,
  });
}

function spawnConfetti() {
  const colors = ["#ff6b6b","#ffa94d","#ffe066","#69db7c","#4cc9f0","#da77f2","#ff9ff3","#74c0fc"];
  for (let i = 0; i < 160; i++) particles.push({
    x: Math.random()*window.innerWidth, y: -20-Math.random()*100,
    vx: (Math.random()-0.5)*5, vy: 2+Math.random()*4,
    size: 6+Math.random()*9, color: colors[Math.floor(Math.random()*colors.length)],
    type: Math.random()>0.5?"square":"circle",
    decay: 0.005+Math.random()*0.004, gravity: 0.05,
    life: 1, rotation: Math.random()*Math.PI*2, rotSpeed: (Math.random()-0.5)*0.2,
  });
}

// ── STATISTIK & SPEICHERN ──────────────────────────────────────────
function loadStats() {
  try { const s=localStorage.getItem("ks_stats"); return s?JSON.parse(s):{easy:{count:0,best:null},mittel:{count:0,best:null},schwer:{count:0,best:null},boshaft:{count:0,best:null}}; }
  catch { return {easy:{count:0,best:null},mittel:{count:0,best:null},schwer:{count:0,best:null},boshaft:{count:0,best:null}}; }
}
function saveStats(s) { try{localStorage.setItem("ks_stats",JSON.stringify(s));}catch{} }
function recordWin(diff, secs) {
  const stats=loadStats();
  stats[diff].count++;
  if(stats[diff].best===null||secs<stats[diff].best) stats[diff].best=secs;
  saveStats(stats); return stats;
}
function loadGame() { try{const s=localStorage.getItem("ks_save");return s?JSON.parse(s):null;}catch{return null;} }
function saveGame(s) { try{localStorage.setItem("ks_save",JSON.stringify(s));}catch{} }
function loadCfg() { try{const s=localStorage.getItem("ks_cfg");return s?JSON.parse(s):null;}catch{return null;} }
function saveCfg(s) { try{localStorage.setItem("ks_cfg",JSON.stringify(s));}catch{} }

function exportData() {
  const data={version:1,exportDate:new Date().toISOString(),stats:loadStats(),save:loadGame(),settings:loadCfg(),xp:loadXP()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=`neosudoku-${new Date().toLocaleDateString("de")}.json`; a.click(); URL.revokeObjectURL(url);
}
function importData(file, cb) {
  const r=new FileReader();
  r.onload=e=>{
    try {
      const d=JSON.parse(e.target.result);
      if(d.stats)saveStats(d.stats);
      if(d.save)localStorage.setItem("ks_save",JSON.stringify(d.save));
      if(d.settings)saveCfg(d.settings);
      if(d.xp)saveXP(d.xp);
      cb(true);
    } catch{cb(false);}
  };
  r.readAsText(file);
}
const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

// ── STATE ──────────────────────────────────────────────────────────
const cfg0=loadCfg()||{};
let state = {
  screen: "menu", difficulty: "mittel", themeName: cfg0.themeName||"neon",
  showTimer: cfg0.showTimer??true, showErrors: cfg0.showErrors??true,
  solution: null, cages: [], cageMap: {}, userGrid: null, notes: null, history: [],
  selected: null, noteMode: false, seconds: 0, timerInterval: null,
  completedCages: new Set(), hadErrors: false, usedHints: false,
};

function applyStyle(th) {
  document.body.style.background = th.bgGrad || th.bg;
  document.body.style.color = th.text;
  if(state.themeName==="neon") document.body.classList.add("neon-theme");
  else document.body.classList.remove("neon-theme");
}

function startTimer(){
  clearInterval(state.timerInterval);
  state.timerInterval=setInterval(()=>{
    state.seconds++;
    const el=document.getElementById("live-timer");
    if(el && state.showTimer) el.textContent=fmt(state.seconds);
  },1000);
}
function stopTimer(){ clearInterval(state.timerInterval); }

function initNewGame(diff) {
  state.difficulty = diff;
  state.solution = generateSolution();
  state.cages = makeCages(state.solution, diff);
  state.cageMap = buildCageMap(state.cages);
  state.userGrid = Array.from({length:9},()=>Array(9).fill(0));
  
  let clues = {easy:38,mittel:30,schwer:23,boshaft:16}[diff];
  let p = []; for(let i=0;i<81;i++) p.push(i);
  p.sort(()=>Math.random()-0.5);
  for(let i=0;i<clues;i++){
    const r=Math.floor(p[i]/9), c=p[i]%9;
    state.userGrid[r][c]=state.solution[r][c];
  }
  
  state.notes = Array.from({length:9},()=>Array.from({length:9},()=>new Set()));
  state.history = []; state.selected = null; state.noteMode = false;
  state.seconds = 0; state.hadErrors = false; state.usedHints = false;
  state.completedCages = new Set();
  state.cages.forEach((c,idx)=>{ if(isCageDone(c,state.userGrid)) state.completedCages.add(idx); });
  
  state.screen = "game"; render(); startTimer(); saveCurrentState();
}

function loadAndContinue() {
  const s = loadGame(); if(!s) return;
  state.difficulty = s.difficulty; state.solution = s.solution;
  state.cages = s.cages; state.cageMap = s.cageMap; state.userGrid = s.userGrid;
  state.notes = s.notes ? s.notes.map(r=>r.map(n=>new Set(n))) : Array.from({length:9},()=>Array.from({length:9},()=>new Set()));
  state.seconds = s.seconds||0; state.hadErrors = s.hadErrors??false; state.usedHints = s.usedHints??false;
  state.completedCages = new Set(s.completedCages||[]);
  state.selected = null; state.noteMode = false; state.history = [];
  state.screen = "game"; render(); startTimer();
}

function saveCurrentState() {
  if(state.screen!=="game")return;
  saveGame({
    difficulty: state.difficulty, solution: state.solution, cages: state.cages, cageMap: state.cageMap,
    userGrid: state.userGrid, notes: state.notes.map(r=>r.map(n=>[...n])), seconds: state.seconds,
    hadErrors: state.hadErrors, usedHints: state.usedHints, completedCages: [...state.completedCages]
  });
}

function cellClick(r, c) {
  state.selected = [r,c]; render();
}

function pushHistory() {
  state.history.push({
    grid: state.userGrid.map(r=>[...r]),
    notes: state.notes.map(row=>row.map(s=>new Set(s)))
  });
  if(state.history.length>30) state.history.shift();
}
function undo() {
  if(!state.history.length)return;
  const prev=state.history.pop();
  state.userGrid=prev.grid; state.notes=prev.notes;
  state.cages.forEach((c,i)=>{
    if(isCageDone(c,state.userGrid)) state.completedCages.add(i);
    else state.completedCages.delete(i);
  });
  render(); saveCurrentState();
}

function inputNum(n) {
  if(!state.selected)return;
  const [r,c] = state.selected;
  
  pushHistory();
  const current = state.userGrid[r][c];
  
  if(state.noteMode) {
    if(n===0) state.notes[r][c].clear();
    else {
      if(state.notes[r][c].has(n)) state.notes[r][c].delete(n);
      else { state.notes[r][c].add(n); state.userGrid[r][c]=0; }
    }
  } else {
    if(current === n) state.userGrid[r][c]=0;
    else {
      state.userGrid[r][c]=n;
      if(n!==0) state.notes[r][c].clear();
      if(n!==0 && n!==state.solution[r][c]) {
        state.hadErrors = true;
        const cellEl = document.getElementById(`cell-${r}-${c}`);
        if(cellEl) { cellEl.classList.add("shake"); setTimeout(()=>cellEl.classList.remove("shake"),400); }
      }
    }
  }
  
  // Prüfe Cages auf Partikel
  state.cages.forEach((cage, idx)=>{
    if(!state.completedCages.has(idx) && isCageDone(cage, state.userGrid)) {
      state.completedCages.add(idx);
      const cellEl = document.getElementById(`cell-${cage.cells[0][0]}-${cage.cells[0][1]}`);
      if(cellEl) {
        const rect = cellEl.getBoundingClientRect();
        spawnCageParticles(rect.left, rect.top, rect.width*2, rect.height*2, cage.color);
        cellEl.classList.add("cage-pop"); setTimeout(()=>cellEl.classList.remove("cage-pop"),350);
      }
    } else if(state.completedCages.has(idx) && !isCageDone(cage, state.userGrid)) {
      state.completedCages.delete(idx);
    }
  });

  render(); saveCurrentState(); checkWin();
}

function giveHint() {
  if(!state.selected)return;
  const [r,c] = state.selected;
  if(state.userGrid[r][c] === state.solution[r][c])return;
  pushHistory();
  state.userGrid[r][c] = state.solution[r][c];
  state.notes[r][c].clear();
  state.usedHints = true;
  
  state.cages.forEach((cage, idx)=>{
    if(!state.completedCages.has(idx) && isCageDone(cage, state.userGrid)) {
      state.completedCages.add(idx);
    }
  });
  render(); saveCurrentState(); checkWin();
}

function checkWin() {
  for(let r=0;r<9;r++){
    for(let c=0;c<9;c++){ if(state.userGrid[r][c]!==state.solution[r][c])return; }
  }
  stopTimer(); localStorage.removeItem("ks_save");
  const gain = calcXpGain(state.difficulty, state.seconds, state.usedHints, state.hadErrors);
  const res = addXP(gain.total);
  recordWin(state.difficulty, state.seconds);
  
  state.screen = "victory";
  state.victoryLayout = { gain, res };
  render(); spawnConfetti();
}

// ── RENDERER ───────────────────────────────────────────────────────
const app = document.getElementById("app");

function render() {
  const th = THEMES[state.themeName];
  applyStyle(th);
  app.innerHTML = "";
  
  if(state.screen === "menu") {
    const xpD = loadXP();
    const lvl = calcLevel(xpD.totalXp);
    const stats = loadStats();
    
    let container = document.createElement("div");
    container.className = "card";
    container.style.background = th.card;
    container.style.border = `1px solid ${th.cardBorder}`;
    if(th.glow) container.style.boxShadow = `0 8px 32px ${th.accentSoft}`;
    
    let html = `
      <h1 class="menu-title" style="font-size:26px; font-weight:900; text-align:center; margin-bottom:4px; font-family:'Orbitron',sans-serif; letter-spacing:1px; color:${state.themeName==='neon'?'#7060e0':th.text}; text-shadow:${state.themeName==='neon'?'0 0 10px #7060e0':''}">NEO SUDOKU</h1>
      <p style="font-size:11px; text-align:center; opacity:0.6; margin-bottom:20px; font-weight:700;">KILLER VARIANTE</p>
      
      <div style="background:rgba(255,255,255,0.03); border-radius:12px; padding:12px; margin-bottom:20px; font-size:12px;">
        <div style="display:flex; justify-content:between; font-weight:700; margin-bottom:4px;">
          <span>Lvl ${lvl.level} — ${getLevelTitle(lvl.level)}</span>
          <span style="margin-left:auto; opacity:0.7;">${lvl.currentXp}/${lvl.neededXp} XP</span>
        </div>
        <div style="width:100%; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden;">
          <div style="width:${(lvl.currentXp/lvl.neededXp)*100}%; height:100%; background:${th.accent}; box-shadow:0 0 6px ${th.accent}"></div>
        </div>
      </div>
    `;
    
    if(loadGame()) {
      html += `<button id="btn-continue" style="width:100%; padding:14px; margin-bottom:12px; border-radius:10px; font-weight:700; background:${th.accent}; color:#fff; font-size:13px; box-shadow:0 4px 12px ${th.accentSoft}">Fortsetzen (${DIFF_LABELS[loadGame().difficulty]})</button>`;
    }
    
    html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">`;
    DIFFICULTIES.forEach(d=>{
      const bst = stats[d].best ? fmt(stats[d].best) : "—";
      html += `
        <button class="btn-diff" data-diff="${d}" style="padding:14px 10px; border-radius:10px; background:${th.btnBg}; border:1px solid ${th.btnBorder}; color:${th.text}; display:flex; flex-direction:column; align-items:center; justify-content:center;">
          <span style="font-weight:700; font-size:12px; margin-bottom:2px;">${DIFF_LABELS[d]}</span>
          <span style="font-size:9px; opacity:0.5;">Best: ${bst}</span>
        </button>
      `;
    });
    html += `</div>`;
    
    html += `<button onclick="window.location.href='battle.html'" style="width:100%; padding:14px; margin-bottom:15px; border-radius:10px; font-weight:700; background:rgba(255,64,255,0.05); border:2px solid #ff40ff; color:#ff40ff; font-size:13px; font-family:'Orbitron',sans-serif; box-shadow:0 0 10px rgba(255,64,255,0.2);">⚔️ BATTLE MODUS</button>`;
    
    html += `
      <button id="btn-settings" style="width:100%; padding:11px; border-radius:8px; background:transparent; border:1px solid ${th.btnBorder}; color:${th.btnText}; font-size:11px; font-weight:700;">⚙️ Einstellungen &amp; Daten</button>
    `;
    
    container.innerHTML = html;
    app.appendChild(container);
    
    const bc=container.querySelector("#btn-continue"); if(bc) bc.onclick=loadAndContinue;
    container.querySelectorAll(".btn-diff").forEach(b=>{ b.onclick=()=>initNewGame(b.dataset.diff); });
    container.querySelector("#btn-settings").onclick=()=> { state.screen="settings"; render(); };
  }
  
  else if(state.screen === "game") {
    let wrap = document.createElement("div");
    wrap.style.cssText = "display:flex; flex-direction:column; width:100%; max-width:440px; height:100%; padding:8px; box-sizing:border-box; justify-content:center;";
    
    let top = document.createElement("div");
    top.style.cssText = "display:flex; align-items:center; justify-content:between; margin-bottom:6px; font-size:11px; font-weight:700; opacity:0.8; padding:0 4px;";
    top.innerHTML = `
      <span style="letter-spacing:0.5px;">${DIFF_LABELS[state.difficulty].toUpperCase()}</span>
      <span id="live-timer" style="margin-left:auto; font-family:monospace; font-size:13px; color:${th.timerColor}">${state.showTimer?fmt(state.seconds):""}</span>
    `;
    wrap.appendChild(top);
    
    let board = document.createElement("div");
    board.className = "board";
    board.style.cssText = `display:grid; grid-template-columns:repeat(9,1fr); width:100%; aspect-ratio:1; border:3px solid ${th.outerLine}; background:${th.cell}; box-shadow:0 4px 20px rgba(0,0,0,0.25); border-radius:4px; overflow:hidden;`;
    
    for(let r=0;r<9;r++){
      for(let c=0;c<9;c++){
        let cell = document.createElement("div");
        cell.id = `cell-${r}-${c}`;
        cell.className = "cell";
        
        let borderS = `1px solid ${th.cellBorder}`;
        let bb = borderS, br = borderS;
        if(c===2 || c===5) br = `2px solid ${th.boxLine}`;
        if(r===2 || r===5) bb = `2px solid ${th.boxLine}`;
        cell.style.cssText = `display:flex; flex-direction:column; justify-content:center; align-items:center; aspect-ratio:1; position:relative; font-size:17px; font-weight:700; cursor:pointer; border-bottom:${bb}; border-right:${br};`;
        
        const cIdx = state.cageMap[`${r},${c}`];
        const cage = state.cages[cIdx];
        if(cage) cell.style.background = cage.color + "14";
        
        if(cage && cageTopLeft(cIdx, state.cages)[0]===r && cageTopLeft(cIdx, state.cages)[1]===c) {
          let sumEl = document.createElement("span");
          sumEl.className = "cage-sum";
          sumEl.style.color = th.text;
          sumEl.textContent = cage.sum;
          cell.appendChild(sumEl);
        }
        
        if(state.selected && state.selected[0]===r && state.selected[1]===c) {
          cell.style.background = th.cellSel;
        } else if(state.selected) {
          const [sr,sc] = state.selected;
          if(state.userGrid[r][c]!==0 && state.userGrid[r][c]===state.userGrid[sr][sc]) {
            cell.style.background = th.cellSameNum;
          } else if(sr===r || sc===c || (Math.floor(sr/3)===Math.floor(r/3) && Math.floor(sc/3)===Math.floor(c/3))) {
            cell.style.background = th.cellSameGroup;
          }
        }
        
        const val = state.userGrid[r][c];
        if(val!==0) {
          let txt = document.createElement("span");
          txt.textContent = val;
          if(state.showErrors && val!==state.solution[r][c]) {
            txt.style.color = th.textWrong;
          } else if(val===state.solution[r][c]) {
            txt.style.color = th.textCorrect;
          } else {
            txt.style.color = th.text;
          }
          cell.appendChild(txt);
        } else {
          let ng = document.createElement("div");
          ng.className = "notes-grid";
          ng.style.cssText = "display:grid; grid-template-columns:repeat(3,1fr); width:100%; height:100%; padding:2px; box-sizing:border-box; pointer-events:none; position:absolute; inset:0;";
          for(let n=1;n<=9;n++){
            let nc = document.createElement("div");
            nc.className = "note-cell";
            nc.style.cssText = `display:flex; justify-content:center; align-items:center; font-size:7.5px; font-weight:500; color:${th.noteColor};`;
            if(state.notes[r][c].has(n)) nc.textContent = n;
            ng.appendChild(nc);
          }
          cell.appendChild(ng);
        }
        
        cell.onclick = () => cellClick(r,c);
        board.appendChild(cell);
      }
    }
    wrap.appendChild(board);
    
    let keys = document.createElement("div");
    keys.className = "keypad";
    keys.style.marginTop = "10px";
    
    for(let i=1;i<=9;i++){
      let k = document.createElement("button");
      k.className = "key"; k.textContent = i;
      k.onclick = () => inputNum(i); keys.appendChild(k);
    }
    
    let nBtn = document.createElement("button");
    nBtn.className = `key ${state.noteMode?'active':''}`; nBtn.textContent = "📝";
    nBtn.onclick = () => { state.noteMode=!state.noteMode; render(); }; keys.appendChild(nBtn);
    
    let uBtn = document.createElement("button");
    uBtn.className = "key"; uBtn.textContent = "⎌"; uBtn.onclick = undo; keys.appendChild(uBtn);
    
    let hBtn = document.createElement("button");
    hBtn.className = "key"; hBtn.textContent = "💡"; hBtn.onclick = giveHint; keys.appendChild(hBtn);
    
    let dBtn = document.createElement("button");
    dBtn.className = "key"; dBtn.textContent = "⌫"; dBtn.onclick = () => inputNum(0); keys.appendChild(dBtn);
    
    let xBtn = document.createElement("button");
    xBtn.className = "key"; xBtn.textContent = "✕";
    xBtn.onclick = () => { stopTimer(); state.screen="menu"; render(); }; keys.appendChild(xBtn);
    
    wrap.appendChild(keys);
    app.appendChild(wrap);
  }
  
  else if(state.screen === "settings") {
    let container = document.createElement("div");
    container.className = "card"; container.style.background = th.card; container.style.border = `1px solid ${th.cardBorder}`;
    
    let html = `
      <h2 style="font-size:16px; font-weight:900; margin-bottom:18px; text-align:center; font-family:'Orbitron',sans-serif;">EINSTELLUNGEN</h2>
      
      <div style="margin-bottom:14px; display:flex; flex-direction:column; gap:4px;">
        <label style="font-size:10px; font-weight:700; opacity:0.6;">DESIGN-THEME</label>
        <select id="sel-theme" style="width:100%; padding:10px; border-radius:6px; background:${th.btnBg}; border:1px solid ${th.btnBorder}; color:${th.text}; font-weight:700; font-size:12px; outline:none;">
    `;
    Object.keys(THEMES).forEach(k=>{
      html += `<option value="${k}" ${state.themeName===k?'selected':''}>${THEMES[k].label}</option>`;
    });
    html += `
        </select>
      </div>

      <div style="margin-bottom:14px; display:flex; align-items:center; justify-content:between; font-size:12px; font-weight:700;">
        <label style="opacity:0.8;">Timer einblenden</label>
        <input type="checkbox" id="chk-timer" ${state.showTimer?'checked':''} style="margin-left:auto; width:16px; height:16px;">
      </div>

      <div style="margin-bottom:20px; display:flex; align-items:center; justify-content:between; font-size:12px; font-weight:700;">
        <label style="opacity:0.8;">Fehler rot markieren</label>
        <input type="checkbox" id="chk-errors" ${state.showErrors?'checked':''} style="margin-left:auto; width:16px; height:16px;">
      </div>

      <h3 style="font-size:10px; font-weight:700; opacity:0.6; margin-bottom:8px; text-transform:uppercase;">Daten-Verwaltung</h3>
      <button id="btn-export" style="width:100%; padding:10px; margin-bottom:8px; border-radius:6px; background:${th.btnBg}; border:1px solid ${th.btnBorder}; color:${th.text}; font-size:11px; font-weight:700;">📥 Backup herunterladen (JSON)</button>
      
      <div style="position:relative; margin-bottom:20px;">
        <button style="width:100%; padding:10px; border-radius:6px; background:${th.btnBg}; border:1px solid ${th.btnBorder}; color:${th.text}; font-size:11px; font-weight:700;">📤 Backup einspielen (JSON)</button>
        <input type="file" id="file-import" accept=".json" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
      </div>

      <button id="btn-back-menu" style="width:100%; padding:12px; border-radius:8px; background:${th.accent}; color:#fff; font-size:12px; font-weight:700; box-shadow:0 4px 10px ${th.accentSoft}">Speichern &amp; Zurück</button>
    `;
    container.innerHTML = html;
    app.appendChild(container);
    
    container.querySelector("#sel-theme").onchange=(e)=>{ state.themeName=e.target.value; setTheme(e.target.value); };
    container.querySelector("#chk-timer").onchange=(e)=>{ state.showTimer=e.target.checked; };
    container.querySelector("#chk-errors").onchange=(e)=>{ state.showErrors=e.target.checked; };
    container.querySelector("#btn-export").onclick=exportData;
    container.querySelector("#file-import").onchange=(e)=>{
      if(e.target.files.length){
        importData(e.target.files[0], (success)=>{
          alert(success?"🎉 Backup erfolgreich eingespielt! Seite wird neu geladen.":"❌ Fehler beim Einlesen der Backup-Datei.");
          if(success) window.location.reload();
        });
      }
    };
    container.querySelector("#btn-back-menu").onclick=()=>{
      saveCfg({themeName:state.themeName, showTimer:state.showTimer, showErrors:state.showErrors});
      state.screen="menu"; render();
    };
  }
  
  else if(state.screen === "victory") {
    const { gain, res } = state.victoryLayout;
    let container = document.createElement("div");
    container.className = "card level-up-anim";
    container.style.cssText = `background:${th.card}; border:1px solid ${th.cardBorder}; text-align:center; position:relative;`;
    if(th.glow) container.style.boxShadow = `0 12px 40px rgba(255,215,0,0.2)`;
    
    let html = `
      <div style="font-size:44px; margin-bottom:10px; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.2));">🏆</div>
      <h2 style="font-size:18px; font-weight:900; color:#ffd700; margin-bottom:4px; font-family:'Orbitron',sans-serif; letter-spacing:0.5px;">RÄTSEL GELÖST!</h2>
      <p style="font-size:11px; opacity:0.6; margin-bottom:18px;">Zeit: ${fmt(state.seconds)}</p>
      
      <div style="background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:12px; padding:14px; margin-bottom:20px; font-size:12px; text-align:left;">
        <div style="display:flex; justify-content:between; opacity:0.7; margin-bottom:4px;"><span>Basis-Erfahrung:</span><span style="margin-left:auto;">+${gain.base} XP</span></div>
        <div style="display:flex; justify-content:between; opacity:0.7; margin-bottom:10px;"><span>Leistungs-Bonus:</span><span style="margin-left:auto;">+${gain.bonus} XP</span></div>
        <div style="width:100%; height:1px; background:rgba(255,255,255,0.08); margin-bottom:10px;"></div>
        <div style="display:flex; justify-content:between; font-weight:700; font-size:13px; color:${th.text};">
          <span>Gesamt erhalten:</span>
          <span style="margin-left:auto; color:#ffd700;">+${gain.total} XP</span>
        </div>
      </div>

      <div style="margin-bottom:20px;">
        <div style="display:flex; justify-content:between; font-size:11px; font-weight:700; margin-bottom:4px;">
          <span>Lvl ${res.after.level} — ${getLevelTitle(res.after.level)}</span>
          <span style="margin-left:auto; opacity:0.6;">${res.after.currentXp}/${res.after.neededXp} XP</span>
        </div>
        <div style="width:100%; height:6px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden;">
          <div class="bar-fill" style="height:100%; background:#ffd700; box-shadow:0 0 6px #ffd700; --from:${(res.before.currentXp/res.before.neededXp)*100}%; --to:${(res.after.currentXp/res.after.neededXp)*100}%;"></div>
        </div>
      </div>
    `;
    
    if(res.levelUp) {
      html += `
        <div class="pulse" style="background:linear-gradient(90deg,#ffd700,#ffa94d); color:#000; font-weight:900; font-size:11px; padding:6px; border-radius:20px; margin-bottom:18px; letter-spacing:0.5px; font-family:'Orbitron',sans-serif;">
          🎉 LEVEL UP! DU BIST JETZT LEVEL ${res.after.level} 🎉
        </div>
      `;
    }
    
    html += `<button id="btn-victory-ok" style="width:100%; padding:12px; border-radius:8px; background:${th.accent}; color:#fff; font-weight:700; font-size:13px; box-shadow:0 4px 10px ${th.accentSoft}">Hauptmenü</button>`;
    
    container.innerHTML = html;
    app.appendChild(container);
    
    container.querySelector("#btn-victory-ok").onclick=()=>{ state.screen="menu"; render(); };
  }
}

function setTheme(name) {
  state.themeName = name;
  render();
}

// Tastatur-Listener
window.addEventListener("keydown", e => {
  if (state.screen !== "game" || !state.selected) return;
  const [r, c] = state.selected;
  if (e.key >= "1" && e.key <= "9") { inputNum(parseInt(e.key)); }
  else if (["Backspace", "Delete", "0"].includes(e.key)) { inputNum(0); }
  else if (e.key === "n" || e.key === "N") { state.noteMode = !state.noteMode; render(); }
});

// Starten
applyStyle(THEMES[state.themeName]);
render();
</script>
</body>
</html>
