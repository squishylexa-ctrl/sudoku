<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neo Sudoku</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Orbitron', sans-serif; background: #080610; color: #d0c8ff; }
  #app { position: fixed; top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column; align-items:center; justify-content:center; overflow-y:auto; }
  button { font-family: inherit; cursor: pointer; border: none; outline: none; }
  button:active { opacity: 0.75; }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-5px)}
    40%{transform:translateX(5px)}
    60%{transform:translateX(-3px)}
    80%{transform:translateX(3px)}
  }
  .shake { animation: shake 0.3s; }

  /* Scanlines */
  body::after {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
    pointer-events: none; z-index: 999;
  }

  .menu-title { font-size: 32px; font-weight: 900; text-align: center; margin-bottom: 30px; letter-spacing: 2px; color: #00ffff; text-shadow: 0 0 10px #00ffff; }
  .menu-btn { width: 220px; padding: 12px; margin: 8px; font-size: 14px; font-weight: 700; background: rgba(0,255,255,0.05); border: 2px solid #00ffff; color: #00ffff; border-radius: 4px; box-shadow: 0 0 10px rgba(0,255,255,0.2); transition: all 0.2s; }
  .menu-btn:hover { background: #00ffff; color: #080610; box-shadow: 0 0 20px #00ffff; }
  
  .battle-btn { border-color: #ff40ff; color: #ff40ff; box-shadow: 0 0 10px rgba(255,64,255,0.2); }
  .battle-btn:hover { background: #ff40ff; color: #080610; box-shadow: 0 0 20px #ff40ff; }

  /* Sudoku Feld */
  .board { display: grid; grid-template-columns: repeat(9, 1fr); width: 100%; max-width: 420px; aspect-ratio: 1; border: 3px solid #00ffff; background: #0c091f; box-shadow: 0 0 20px rgba(0,255,255,0.15); margin: 15px 0; }
  .cell { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; aspect-ratio: 1; border: 1px solid rgba(0,255,255,0.15); font-size: 18px; font-weight: 700; color: #ffffff; cursor: pointer; }
  
  /* 3x3 Block-Grenzen */
  .cell:nth-child(3n) { border-right: 2px solid #00ffff; }
  .cell:nth-child(9n) { border-right: none; }
  .board > .cell:nth-child(n+19):nth-child(-n+27),
  .board > .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid #00ffff; }

  .cell.selected { background: rgba(0,255,255,0.25) !important; box-shadow: inset 0 0 8px #00ffff; }
  .cell.same-num { background: rgba(0,255,255,0.1); }
  .cell.err { color: #ff4444; text-shadow: 0 0 5px #ff4444; background: rgba(255,68,68,0.15); }

  /* Cage Summen */
  .cage-sum { position: absolute; top: 1px; left: 2px; font-size: 8px; font-weight: 400; opacity: 0.8; pointer-events: none; }

  /* Notizen */
  .notes-grid { display: grid; grid-template-columns: repeat(3, 1fr); width: 100%; height: 100%; padding: 2px; pointer-events: none; }
  .note-cell { display: flex; align-items: center; justify-content: center; font-size: 7px; color: #8899af; font-weight: 400; }

  /* Keypad */
  .keypad { display: grid; grid-template-columns: repeat(5, 1fr); width: 100%; max-width: 420px; gap: 6px; padding: 0 10px; margin-top: 10px; }
  .key { padding: 12px 0; font-size: 16px; font-weight: 700; background: rgba(0,255,255,0.03); border: 1px solid rgba(0,255,255,0.3); color: #00ffff; border-radius: 4px; text-align: center; }
  .key:hover { background: rgba(0,255,255,0.1); }
  .key.active { background: #00ffff; color: #080610; box-shadow: 0 0 10px #00ffff; }

  /* Top Bar */
  .top-bar { display: flex; justify-content: space-between; width: 100%; max-width: 420px; padding: 0 10px; font-size: 12px; font-weight: 700; color: #8b9bb4; }
  
  .theme-panel { display: flex; gap: 5px; margin-top: 15px; }
  .theme-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
  .theme-dot.active { border-color: #ffffff; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ── ENGINE LOGIK DIREKT INTEGRIERT ──────────────────────────────
const CAGE_COLORS = ["rgba(255,107,107,0.07)","rgba(255,169,77,0.07)","rgba(38,208,160,0.07)","rgba(91,164,207,0.07)","rgba(180,122,224,0.07)"];

function generateSolution() {
  const g = Array.from({length:9}, () => Array(9).fill(0));
  const ok = (r,c,n) => {
    for(let i=0;i<9;i++) if(g[r][i]===n||g[i][c]===n) return false;
    const br=Math.floor(r/3)*3, bc=Math.floor(c/3)*3;
    for(let i=0;i<3;i++) for(let j=0;j<3;j++) if(g[br+i][bc+j]===n) return false;
    return true;
  };
  const solve = pos => {
    if(pos===81) return true;
    const r=Math.floor(pos/9), c=pos%9;
    const nums=[1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5);
    for(let n of nums) {
      if(ok(r,c,n)) { g[r][c]=n; if(solve(pos+1)) return true; g[r][c]=0; }
    }
    return false;
  };
  solve(0); return g;
}

function makeCages(sol, diff) {
  const cages = []; const done = Array.from({length:9}, () => Array(9).fill(false));
  let target = diff === "Einfach" ? 35 : diff === "Normal" ? 45 : diff === "Schwer" ? 55 : 65;
  
  for(let r=0; r<9; r++) {
    for(let c=0; c<9; c++) {
      if(done[r][c]) continue;
      const cage = [[r,c]]; done[r][c]=true;
      let size = Math.floor(Math.random()*3)+1;
      while(cage.length < size) {
        const [lr,lc] = cage[cage.length-1];
        const nb = [[lr-1,lc],[lr+1,lc],[lr,lc-1],[lr,lc+1]]
          .filter(([cr,cc]) => cr>=0&&cr<9&&cc>=0&&cc<9&&!done[cr][cc]);
        if(!nb.length) break;
        const [nr,nc] = nb[Math.floor(Math.random()*nb.length)];
        cage.push([nr,nc]); done[nr][nc]=true;
      }
      const sum = cage.reduce((s,[cr,cc]) => s+sol[cr][cc], 0);
      cages.push({cells:cage, sum, color:CAGE_COLORS[cages.length%CAGE_COLORS.length]});
    }
  }
  return cages;
}

// ── SPIEL ZUSTAND ────────────────────────────────────────────────
const state = {
  screen: "menu", difficulty: "Normal",
  solution: null, cages: null, cageMap: {}, userGrid: null,
  selected: null, noteMode: false,
  notes: Array.from({length:9},()=>Array.from({length:9},()=>new Set())),
  seconds: 0, timerInterval: null
};

function initGame(diff) {
  state.difficulty = diff;
  state.solution = generateSolution();
  state.cages = makeCages(state.solution, diff);
  state.cageMap = {};
  state.cages.forEach((c,i) => c.cells.forEach(([cr,cc]) => { state.cageMap[`${cr},${cc}`]=i; }));
  
  // Spielfeld leeren basierend auf Schwierigkeit
  state.userGrid = Array.from({length:9}, () => Array(9).fill(0));
  let clues = diff === "Einfach" ? 40 : diff === "Normal" ? 30 : diff === "Schwer" ? 22 : 15;
  let positions = Array.from({length:81}, (_,i)=>i).sort(()=>Math.random()-0.5);
  for(let i=0; i<clues; i++) {
    const r = Math.floor(positions[i]/9), c = positions[i]%9;
    state.userGrid[r][c] = state.solution[r][c];
  }

  state.selected = null; state.seconds = 0;
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => { state.seconds++; updateTimerUi(); }, 1000);
  state.screen = "game";
  render();
}

function updateTimerUi() {
  const t = document.getElementById("timer-display");
  if(t) {
    const m = Math.floor(state.seconds/60).toString().padStart(2,'0');
    const s = (state.seconds%60).toString().padStart(2,'0');
    t.textContent = `${m}:${s}`;
  }
}

function inputNum(n) {
  if(!state.selected) return;
  const [r,c] = state.selected;
  if(state.noteMode) {
    if(n===0) state.notes[r][c].clear();
    else if(state.notes[r][c].has(n)) state.notes[r][c].delete(n);
    else state.notes[r][c].add(n);
  } else {
    state.userGrid[r][c] = state.userGrid[r][c] === n ? 0 : n;
  }
  render();
  checkWin();
}

function checkWin() {
  for(let r=0;r<9;r++) {
    for(let c=0;c<9;c++) {
      if(state.userGrid[r][c] !== state.solution[r][c]) return;
    }
  }
  clearInterval(state.timerInterval);
  alert("🎉 Geflasht! Du hast das Rätsel gelöst!");
  state.screen = "menu";
  render();
}

// ── UI RENDERER ──────────────────────────────────────────────────
const app = document.getElementById("app");

function render() {
  app.innerHTML = "";
  if(state.screen === "menu") {
    app.innerHTML = `
      <div class="menu-title">NEO SUDOKU</div>
      <button class="menu-btn" onclick="initGame('Einfach')">EINFACH</button>
      <button class="menu-btn" onclick="initGame('Normal')">NORMAL</button>
      <button class="menu-btn" onclick="initGame('Schwer')">SCHWER</button>
      <button class="menu-btn" onclick="initGame('Boshaft')">BOSHAFT</button>
      <button class="menu-btn battle-btn" onclick="window.location.href='battle.html'">⚔️ BATTLE MODUS</button>
    `;
  } else if(state.screen === "game") {
    // Top Bar
    const topBar = document.createElement("div");
    topBar.className = "top-bar";
    topBar.innerHTML = `<span>${state.difficulty.toUpperCase()}</span><span id="timer-display">00:00</span>`;
    app.appendChild(topBar);

    // Board
    const board = document.createElement("div");
    board.className = "board";
    
    for(let r=0; r<9; r++) {
      for(let c=0; c<9; c++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        
        const cageIdx = state.cageMap[`${r},${c}`];
        const cage = state.cages[cageIdx];
        if(cage) cell.style.background = cage.color;

        // Zeige Summe links oben im ersten Cage-Feld
        const isTopLeft = cage.cells[0][0] === r && cage.cells[0][1] === c;
        if(isTopLeft) {
          const sumEl = document.createElement("div");
          sumEl.className = "cage-sum";
          sumEl.textContent = cage.sum;
          cell.appendChild(sumEl);
        }

        // Selektion & Highlights
        if(state.selected && state.selected[0]===r && state.selected[1]===c) cell.classList.add("selected");
        else if(state.selected && state.userGrid[r][c] && state.userGrid[r][c] === state.userGrid[state.selected[0]][state.selected[1]]) cell.classList.add("same-num");

        // Werte oder Notizen eintragen
        const val = state.userGrid[r][c];
        if(val !== 0) {
          cell.appendChild(document.createTextNode(val));
          if(val !== state.solution[r][c]) cell.classList.add("err");
        } else {
          const nGrid = document.createElement("div");
          nGrid.className = "notes-grid";
          for(let i=1; i<=9; i++) {
            const nCell = document.createElement("div");
            nCell.className = "note-cell";
            if(state.notes[r][c].has(i)) nCell.textContent = i;
            nGrid.appendChild(nCell);
          }
          cell.appendChild(nGrid);
        }

        cell.onclick = () => { state.selected = [r,c]; render(); };
        board.appendChild(cell);
      }
    }
    app.appendChild(board);

    // Keypad
    const keypad = document.createElement("div");
    keypad.className = "keypad";
    for(let i=1; i<=9; i++) {
      const key = document.createElement("button");
      key.className = "key";
      key.textContent = i;
      key.onclick = () => inputNum(i);
      keypad.appendChild(key);
    }
    
    // Steuer-Tasten
    const noteKey = document.createElement("button");
    noteKey.className = `key ${state.noteMode ? 'active' : ''}`;
    noteKey.textContent = "📝";
    noteKey.onclick = () => { state.noteMode = !state.noteMode; render(); };
    keypad.appendChild(noteKey);

    const delKey = document.createElement("button");
    delKey.className = "key";
    delKey.textContent = "⌫";
    delKey.onclick = () => inputNum(0);
    keypad.appendChild(delKey);

    app.appendChild(keypad);

    // Zurück Button
    const back = document.createElement("button");
    back.className = "menu-btn";
    back.style.marginTop = "20px";
    back.textContent = "← HAUPTMENÜ";
    back.onclick = () => { clearInterval(state.timerInterval); state.screen = "menu"; render(); };
    app.appendChild(back);
    
    updateTimerUi();
  }
}

// Keyboard Listener
window.addEventListener("keydown", e => {
  if(state.screen !== "game" || !state.selected) return;
  if(e.key >= "1" && e.key <= "9") inputNum(parseInt(e.key));
  else if(["Backspace", "Delete", "0"].includes(e.key)) inputNum(0);
  else if(e.key === "n" || e.key === "N") { state.noteMode = !state.noteMode; render(); }
});

render();
</script>
</body>
</html>
